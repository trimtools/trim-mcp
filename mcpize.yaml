# MCPize manifest - https://mcpize.com
version: 1
name: trim-dev-tools-mcp
description: >-
  Developer utility tools for AI agents via MCP. Provides JSON formatting, base64 encoding/decoding, hashing, UUID
  generation, regex testing, URL encoding, and more.
runtime: typescript
entry: dist/index.js
build:
  install: npm install
  command: npm run build
startCommand:
  type: stdio
  command: node
  args:
    - dist/index.js
